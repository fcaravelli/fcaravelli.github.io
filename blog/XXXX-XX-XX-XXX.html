  <script defer>
    const KATEX_RENDER_OPTS = {
      delimiters: [
        { left: "$$", right: "$$", display: true },
        { left: "\\[", right: "\\]", display: true },
        { left: "$", right: "$", display: false },
        { left: "\\(", right: "\\)", display: false }
      ],
      throwOnError: false,
      macros: { "\\mathbbm": "\\mathbb" },
      ignoredTags: ["script", "noscript", "style", "textarea", "pre", "code"]
    };

    function renderKatexIn(el) {
      if (!el) return;
      if (typeof renderMathInElement !== "function") return;
      renderMathInElement(el, KATEX_RENDER_OPTS);
    }

    function whenKatexReady(cb) {
      const maxTries = 300;
      let tries = 0;
      const timer = setInterval(() => {
        tries++;
        if (typeof renderMathInElement === "function") {
          clearInterval(timer);
          cb();
        } else if (tries >= maxTries) {
          clearInterval(timer);
          console.warn("KaTeX auto-render not available (renderMathInElement missing).");
        }
      }, 10);
    }

    function renderAllMath() {
      renderKatexIn(document.querySelector("main.content"));
    }

    window.__renderAllMath = function () {
      whenKatexReady(renderAllMath);
    };

    document.addEventListener("DOMContentLoaded", () => {
      window.__renderAllMath();
      window.addEventListener("load", () => window.__renderAllMath(), { once: true });
    });
  </script>

  <script>
    async function loadSidebar() {
      const sidebarContainer = document.getElementById("sidebar");

      try {
        const response = await fetch("../partials/sidebar.html", { cache: "no-store" });
        const html = await response.text();
        sidebarContainer.innerHTML = html;

        const currentPath = window.location.pathname.split("/").pop();
        const links = sidebarContainer.querySelectorAll("a");
        links.forEach(link => {
          if (link.getAttribute("href") === currentPath) link.classList.add("active");
        });

        if (typeof window.__renderAllMath === "function") {
          window.__renderAllMath();
        }
      } catch (e) {
        console.warn("Sidebar failed to load:", e);
      }
    }

    loadSidebar();
  </script>
