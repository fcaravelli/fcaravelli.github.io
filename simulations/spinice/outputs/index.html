<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spin Ice Output Files</title>
  <style>
    :root {
      --bg: #f5f2ea;
      --card: #fffdf8;
      --ink: #1f2933;
      --muted: #66727f;
      --line: #d8d0c0;
      --accent: #0f766e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Avenir Next", Avenir, "Segoe UI", sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #faf7f0 0%, var(--bg) 100%);
    }

    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 36px 20px 48px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--card);
      padding: 24px;
    }

    h1 { margin: 0; }
    p { color: var(--muted); line-height: 1.55; }

    .nav {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .nav a {
      color: var(--accent);
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(15, 118, 110, 0.1);
      border: 1px solid rgba(15, 118, 110, 0.18);
      font-weight: 600;
    }

    .empty {
      margin-top: 22px;
      padding: 16px 18px;
      border-radius: 14px;
      background: #fbf9f3;
      border: 1px solid #eee6d7;
    }
  </style>
</head>
<body>
  <main>
    <div class="panel">
      <h1>Outputs Folder</h1>
      <p>File-by-file index for <code>simulations/spinice/outputs</code>.</p>
      <div class="nav">
        <a href="../index.html">Back to spinice index</a>
      </div>
      <div class="empty">
        This folder is currently empty except for this <code>index.html</code>.
      </div>
    </div>
  </main>
</body>
</html>
